# Block 1: HTTP → HTTPS redirect
server {
    listen 80;
    server_name test.dyna.com;
    return 301 https://$host$request_uri;
}

# Block 2: HTTPS → Varnish (public traffic)
server {
    listen 443 ssl http2;
    server_name test.dyna.com;

    ssl_certificate /etc/nginx/ssl/test.dyna.com.crt;
    ssl_certificate_key /etc/nginx/ssl/test.dyna.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 100M;
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    # Static files served directly — never goes through Varnish
    location /static/ {
        alias /var/www/html/pub/static/;
        expires max;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri $uri/ =404;
    }

    location /media/ {
        alias /var/www/html/pub/media/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri $uri/ =404;
    }

    # Everything else → Varnish
    location / {
        proxy_pass http://varnish:6081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
        proxy_read_timeout 600s;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }
}

# Block 3: Internal HTTP backend for Varnish → PHP
server {
    listen 8080;
    server_name test.dyna.com;
    root /var/www/html/pub;
    index index.php;

    client_max_body_size 100M;
    fastcgi_buffers 16 16k;
    fastcgi_buffer_size 32k;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location /static/ {
        expires max;
        access_log off;
        try_files $uri $uri/ /static.php?resource=$uri&$args;
    }

    location /media/ {
        try_files $uri $uri/ /get.php?$args;
        location ~* \.(ico|jpg|jpeg|png|gif|svg|js|css|woff|woff2|ttf|eot)$ {
            access_log off;
            expires 30d;
            try_files $uri =404;
        }
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_read_timeout 600s;
    }

    location ~ /\.ht {
        deny all;
    }
}
